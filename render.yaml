# Render Blueprint — MUST live at the repo root.
# Deploy: Render Dashboard → New → Blueprint → select this repo → set the 3
# secret env vars (marked sync:false) → Apply.
#
# Uses the Node runtime and builds from the backend/ subfolder via rootDir, so
# no Dockerfile path juggling. Render injects PORT automatically; the app reads
# process.env.PORT, so we do NOT set PORT here.
services:
  - type: web
    name: taskflow-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: API_KEY
        sync: false
